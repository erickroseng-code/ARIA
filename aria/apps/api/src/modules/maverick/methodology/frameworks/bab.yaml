name: BAB
full_name: "Before → After → Bridge"
source: "Cashvertising (Drew Whitman) / Persuasive Copywriting Archive"
best_for:
  - Transformações rápidas e visuais
  - Nichos de lifestyle, fitness, finanças, carreira
  - Quando o resultado é muito concreto e mensurável

structure:
  before:
    label: "ANTES — O Estado Atual (0-5s)"
    instruction: "Pinte o quadro da realidade ATUAL do espectador com detalhes sensoriais e emocionais precisos. Seja tão específico que o espectador pense 'você está falando de mim'."
    duration: "0-5s"
  after:
    label: "DEPOIS — O Estado Desejado (5-20s)"
    instruction: "Descreva o futuro desejado com a mesma riqueza de detalhes. Números reais, sentimentos reais, cenas vividas. Deixe o espectador 'sentir' o resultado antes de saber como chegar lá."
    duration: "5-20s"
  bridge:
    label: "PONTE — O Mecanismo (20-50s)"
    instruction: "Revele o que liga o ANTES ao DEPOIS. Seja específico sobre o mecanismo — não 'estratégia', mas o que exatamente muda. Termine com a oferta como a ponte mais curta entre os dois mundos."
    duration: "20-50s"
  cta:
    label: "CTA (Final)"
    instruction: "Uma ação que inicia a travessia da ponte agora."

few_shot_example: |
  😰 ANTES: "É sexta-feira à noite. Seu feed está aberto. Você olha para o concorrente — que entrou no mercado depois de você — e vê que ele está com lista de espera. E você ainda está esperando a DM que não chega."
  
  ✨ DEPOIS: "Agora imagine: segunda de manhã, você abre o Instagram e já tem 3 mensagens de pessoas perguntando como contratar você. Você não está em promoção. Você não baixou seu preço. As pessoas chegam pré-convencidas porque o conteúdo já fez o trabalho de venda antes de você abrir a boca."
  
  🌉 PONTE: "A diferença entre os dois cenários não é talento, não é nicho, não é quanto você posta. É uma coisa: arquitetura de autoridade. Quando cada post que você publica está dentro de uma estrutura calculada — onde você gradualmente eleva sua percepção de especialista e cria contexto de compra — a venda vira consequência, não esforço.
  
  É o que eu implemento com meus clientes em 21 dias."
  
  📣 CTA: "Comenta '21 DIAS' que eu te mando o protocolo completo."
