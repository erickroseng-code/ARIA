name: MASTERS
full_name: "Mestres do Copywriting — Princípios Atemporais Adaptados ao Digital"
source: "Ogilvy on Advertising / Scientific Advertising (Hopkins) / The Adweek Copywriting Handbook / Sugarman / Gary Halbert Letters"
best_for:
  - Produtos com detalhe diferenciador único
  - Personalização extrema por nicho
  - Copy sensorial que remove objeção antes de vender
  - Narrativa de descoberta pessoal

# ─── Princípio 1: Ogilvy — O Detalhe Específico ────────────────────────────
ogilvy_principle:
  name: "O Detalhe que Para Tudo"
  lesson: |
    Passei 3 semanas estudando o produto até encontrar o detalhe do 'relógio elétrico'.
    Um detalhe específico e inesperado vale mais que 10 afirmações genéricas de qualidade.
    Pesquisa é o segredo — o ângulo viral está sempre escondido nos detalhes que ninguém menciona.
  original_example: |
    "A 60 milhas por hora, o ruído mais alto neste novo Rolls-Royce vem do relógio elétrico."
  adapted_for_digital: |
    Não: "Meu método funciona de verdade."
    Sim: "O ponto de virada de todos os meus clientes aconteceu em um detalhe que a maioria ignora: 
    o tempo entre o comentário do seguidor e a sua resposta. 4 horas de diferença no tempo de resposta 
    nos primeiros 30 minutos de publicação cortou o alcance orgânico ao meio."
  prompt_instruction: |
    Encontre o DETALHE MAIS ESPECÍFICO e inesperado sobre o tópico. Não o mais óbvio.
    O que leva 3 semanas de pesquisa para descobrir? Esse é o gancho.
    Use números, nomes técnicos, ou especificidades que ninguém menciona.

# ─── Princípio 2: Halbert — Personalização Extrema ──────────────────────────
halbert_principle:
  name: "A Carta Pessoal para Milhões"
  lesson: |
    A carta foi enviada para milhões de pessoas e pareceu pessoal para cada uma.
    Personalização extrema e curiosidade movem montanhas.
    Fale com UM leitor específico — nunca com 'vocês'. O conteúdo que parece escrito PARA MIM tem 10x mais engajamento.
  original_example: |
    "Você sabia que o nome da sua família tem um Brasão de Armas histórico, registrado em manuscritos de 7 séculos?"
  adapted_for_digital: |
    Não: "Criadores de conteúdo que não vendem..."
    Sim: "Se você tem entre 5.000 e 20.000 seguidores, posta pelo menos 3x por semana, e a última venda 
    foi há mais de 10 dias — eu estou falando diretamente com você. Este vídeo foi feito para exatamente 
    o seu momento."
  prompt_instruction: |
    Identifique o avatar EXATO com especificidade cirúrgica: seguidores, frequência de post, 
    tempo sem venda, plataforma, nicho. Quanto mais específico, mais o espectador certo vai sentir 
    que estás falando diretamente com ele. Escreva para UM, fale para mil.

# ─── Princípio 3: Hopkins — Remoção Sensorial do Problema ───────────────────
hopkins_principle:
  name: "Venda a Remoção, Não o Produto"
  lesson: |
    Não vendi pasta de dente. Eu vendi a 'beleza' de dentes limpos.
    Não venda o produto — venda a remoção de um problema sensorial que o leitor já sente.
    Ative os sentidos: o que o problema FAZ sentir, cheirar, ver ou ouvir? 
    Então mostre a remoção desse desconforto.
  original_example: |
    "Passe a língua em seus dentes. Você sente uma camada viscosa? Essa camada é o que rouba o brilho..."
  adapted_for_digital: |
    Não: "Aprenda a escrever legendas que vendem."
    Sim: "Já ficou olhando para a caixa de entrada esperando uma resposta que não chegou?
    Você mandou a proposta. A pessoa viu. Coração azul. Depois... silêncio.
    Essa sensação tem nome e tem solução. Não é sua oferta. É a ordem em que você apresenta as coisas."
  prompt_instruction: |
    Ative um SENTIDO específico no gancho — algo que o espectador já SENTE mas nunca nomeou.
    A ansiedade de ver 'visto' sem resposta. O aperto de publicar e ter 3 curtidas. 
    A vergonha de cobrar um preço baixo.
    Nomeie a sensação com precisão. Depois venda a remoção dela.

# ─── Princípio 4: Sugarman — A Jornada Emocional + Prova sem Risco ──────────
sugarman_principle:
  name: "Jornada Emocional + Risco Zero"
  lesson: |
    A venda é uma jornada emocional. Conto uma história, explico a ciência, 
    depois deixo o cliente testar sem risco.
    Reduza a fricção ao mínimo absoluto no CTA. A garantia ou o teste gratuito eliminam 
    a última objeção consciente. O cérebro compra emoção e justifica com lógica.
  original_example: |
    "Eu estava dirigindo quando coloquei estes óculos. O mundo mudou. Tudo ficou incrivelmente nítido...
    Se você não concordar que são os melhores óculos que já usou, basta devolver — e ainda seremos amigos."
  adapted_for_digital: |
    Não: "Entre em contato para saber mais."
    Sim: "Implementei esse framework com 3 clientes semana passada. Resultado médio: R$6.800 em 17 dias.
    Sem anúncios. Sem mais posts. Mesmos seguidores.
    Se você quiser testar nos próximos 7 dias sem compromisso, me manda 'TESTE' no direct.
    Se não funcionar, me xinga à vontade."
  prompt_instruction: |
    Estruture em 3 camadas: EMOÇÃO (a descoberta pessoal, a história) → LÓGICA (o mecanismo, 
    por que funciona) → RISCO ZERO (teste, garantia, sem compromisso, 'e ainda seremos amigos').
    A última objeção sempre é risco. Remova ela com humor e leveza.

# ─── Few-shot example combinando os 4 princípios ────────────────────────────
few_shot_example: |
  [Nota: Este exemplo combina os 4 princípios dos mestres em um único roteiro digital]

  🎣 GANCHO (Ogilvy — detalhe específico + Hopkins — sensorial):
  "Você já reparou que os 3 primeiros segundos do seu Reel são gravados com um ruído de fundo 
  que faz o algoritmo reduzir o alcance? Não é o microfone. É o arquivo de áudio."

  🔍 HISTÓRIA (Sugarman — jornada emocional):
  "Passei 6 dias assistindo os Reels dos meus 47 clientes tentando entender por que alguns 
  explodiam e outros com o mesmo tema afundavam. Encontrei o padrão no detalhe mais idiota 
  que eu já vi — a taxa de sample rate do arquivo de áudio exportado pelo CapCut no Android 
  vs. iPhone. É diferente. E o algoritmo penaliza."

  💡 MECANISMO (Halbert — específico para o avatar):
  "Se você grava pelo Instagram nativo no Android e edita no CapCut, você está rodando com 44.1kHz.
  O padrão 'favorito' do algoritmo é 48kHz. Dois números. Isso explica por que o Reel do seu 
  concorrente com conteúdo pior chegou a mais pessoas."

  📣 CTA (Sugarman — risco zero):
  "Exporta seu próximo Reel com configuração manual: 48kHz, 320kbps. Me manda o resultado em 48h.
  Se não melhorar, me xinga nos comentários — prometo que não vou bloquear."
