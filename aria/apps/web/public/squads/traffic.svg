<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0c04"/>
      <stop offset="100%" style="stop-color:#2d1200"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Bar chart - growing bars -->
  <rect x="14" y="68" width="12" height="16" rx="3" fill="url(#orange)" opacity="0.45"/>
  <rect x="30" y="55" width="12" height="29" rx="3" fill="url(#orange)" opacity="0.65"/>
  <rect x="46" y="42" width="12" height="42" rx="3" fill="url(#orange)" opacity="0.85"/>
  <rect x="62" y="30" width="12" height="54" rx="3" fill="url(#glow)"/>
  <!-- Trending arrow -->
  <polyline points="14,65 28,50 44,38 62,25" stroke="#fb923c" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Arrow head -->
  <polyline points="55,22 62,25 65,33" stroke="#fb923c" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot highlight -->
  <circle cx="62" cy="25" r="3.5" fill="#fb923c"/>
</svg>
