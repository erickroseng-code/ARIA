<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #E53E3E;
      --bg: #111111;
      --card: #1C1C1E;
      --text: #FFFFFF;
      --text-dim: rgba(255, 255, 255, 0.4);
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      font-size: 13px;
    }

    h1 { font-size: 16px; font-weight: 800; margin-bottom: 2px; letter-spacing: -0.5px; }
    .subtitle { color: var(--text-dim); font-size: 11px; margin-bottom: 12px; }

    /* ── Tabs ─────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 11px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: rgba(229, 62, 62, 0.1);
      border-color: var(--primary);
      color: var(--primary);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Common ───────────────────────────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: block;
    }

    .btn-icon {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
    }

    /* ── Queue Section ────────────────────────────────────────────────── */
    .api-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 11px;
      outline: none;
    }

    .queue-container {
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .queue-item {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .queue-item:hover { border-color: var(--primary); }
    .queue-item.selected { border-width: 2px; border-color: var(--primary); padding: 11px; }

    .item-title { font-weight: 700; font-size: 12px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-meta { font-size: 10px; color: var(--text-dim); }

    /* ── Manual Input ─────────────────────────────────────────────────── */
    .manual-actions {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .manual-actions button {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px dashed var(--border);
      padding: 8px;
      color: var(--text-dim);
    }
    .manual-actions button:hover { color: #fff; border-color: #fff; }

    .manual-slides-list {
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .manual-slide {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
    }
    
    .manual-slide-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .manual-slide-type {
      font-size: 10px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
    }

    .manual-delete { color: var(--text-dim); background: none; border: none; cursor: pointer; font-size: 12px; }
    .manual-delete:hover { color: var(--primary); }

    .manual-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 6px;
    }
    textarea.manual-input { resize: vertical; min-height: 40px; }


    /* ── Image Upload ─────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      transition: all 0.2s;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .upload-zone:hover { border-color: var(--primary); background: rgba(229, 62, 62, 0.05); }
    .upload-zone p { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
    .upload-zone span { font-size: 10px; color: var(--primary); font-weight: 700; }

    .image-preview-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .preview-thumb {
      aspect-ratio: 1;
      background: var(--card);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Actions ──────────────────────────────────────────────────────── */
    .btn-main {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn-main:active { transform: scale(0.98); }
    .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }

    .status-msg {
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }
    .status-msg.info { display: block; background: rgba(255,255,255,0.05); color: #fff; }
    .status-msg.error { display: block; background: rgba(229, 62, 62, 0.1); color: #ff8080; }
    .status-msg.success { display: block; background: rgba(52, 199, 89, 0.1); color: #81e699; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ── Paste Zone ───────────────────────────────────────────────────── */
    .paste-zone {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .paste-zone textarea {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 11px;
      font-family: inherit;
      resize: vertical;
      min-height: 90px;
      margin-bottom: 8px;
      outline: none;
      line-height: 1.5;
    }
    .paste-zone textarea:focus { border-color: rgba(255,255,255,0.3); }
    .btn-parse {
      width: 100%;
      background: rgba(229, 62, 62, 0.15);
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .btn-parse:hover { background: rgba(229, 62, 62, 0.25); }
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
  </style>
</head>
<body>
  <h1>Maverick Carousel</h1>
  <p class="subtitle">Selecione os frames do modelo e preencha com o conteúdo</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('api')" id="tab-btn-api">API (Fila)</button>
    <button class="tab-btn" onclick="switchTab('manual')" id="tab-btn-manual">✏️ Manual</button>
  </div>

  <div id="tab-api" class="tab-content active">
    <!-- <span class="section-label">1. Roteiros na API</span> -->
    <div class="api-box" style="display:none;"> <!-- Hidden for cleaner UI -->
      <input type="text" id="api-url" placeholder="https://aria-api.onrender.com">
      <button class="btn-icon" onclick="fetchQueue()">🔄 Atualizar</button>
    </div>

    <div class="queue-container" id="queue-list">
      <div style="text-align:center; padding: 20px; color: var(--text-dim); font-size: 11px;">
        Buscando fila...
      </div>
    </div>
  </div>

  <div id="tab-manual" class="tab-content">

    <!-- Paste & Parse -->
    <div class="paste-zone">
      <span class="section-label">Colar roteiro</span>
      <textarea id="raw-text" placeholder="Cole o roteiro aqui...

Separe os slides com ---
Ou prefixe com CAPA:, CONTEÚDO: ou CTA:
(sem prefixo: 1º = capa, último = CTA)"></textarea>
      <button class="btn-parse" onclick="parseAndLoad()">INTERPRETAR ROTEIRO →</button>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">ou adicione manualmente</span>
      <div class="divider-line"></div>
    </div>

    <div class="manual-actions">
      <button class="btn-icon" onclick="addManualSlide('cover')">+ Capa</button>
      <button class="btn-icon" onclick="addManualSlide('content')">+ Corpo</button>
      <button class="btn-icon" onclick="addManualSlide('cta')">+ CTA</button>
    </div>

    <div class="manual-slides-list" id="manual-slides-list">
      <!-- Slides manuais renderizados aqui -->
    </div>
  </div>

  <span class="section-label">Molduras & Fotos</span>
  <div class="upload-zone" onclick="document.getElementById('file-input').click()">
    <p>Arraste fotos locais</p>
    <span>OU CLIQUE PARA SUBIR</span>
    <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
  </div>

  <div class="image-preview-grid" id="preview-grid"></div>

  <button class="btn-main" id="btn-generate" disabled onclick="startGeneration()">
    GERAR NO FIGMA →
  </button>

  <div id="status" class="status-msg"></div>

  <script>
    let currentMode = 'api'; // 'api' | 'manual'
    let queueItems = [];
    let selectedItemId = null;
    let uploadedImages = [];
    
    let manualSlides = [
      { id: Date.now().toString(), type: 'cover', title: '', body: '' }
    ];

    // --- Tabs ---
    function switchTab(mode) {
      currentMode = mode;
      document.getElementById('tab-btn-api').className = mode === 'api' ? 'tab-btn active' : 'tab-btn';
      document.getElementById('tab-btn-manual').className = mode === 'manual' ? 'tab-btn active' : 'tab-btn';
      
      document.getElementById('tab-api').className = mode === 'api' ? 'tab-content active' : 'tab-content';
      document.getElementById('tab-manual').className = mode === 'manual' ? 'tab-content active' : 'tab-content';
      
      if (mode === 'manual') renderManualSlides();
      checkCanGenerate();
    }

    // --- Parse raw text into slides ---
    function parseRawText(rawText) {
      // Split por separador "---" em linha própria
      var sections = rawText.split(/\n[ \t]*---+[ \t]*\n/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });

      // Sem separadores: tentar por parágrafo (linha dupla)
      if (sections.length <= 1) {
        sections = rawText.split(/\n\n+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
      }

      var slides = [];
      var total = sections.length;

      for (var i = 0; i < sections.length; i++) {
        var section = sections[i];
        var lines = section.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
        if (lines.length === 0) continue;

        var type = null;
        var title = '';
        var body = '';
        var firstLine = lines[0];

        // Detectar prefixo de tipo na primeira linha
        var coverMatch = firstLine.match(/^(CAPA|COVER)[:\s]+(.*)$/i);
        var ctaMatch   = firstLine.match(/^(CTA|CHAMADA|CALL TO ACTION)[:\s]+(.*)$/i);
        var bodyMatch  = firstLine.match(/^(CONTE[ÚU]DO|CONTENT|CORPO|SLIDE\s*\d*)[:\s]+(.*)$/i);

        if (coverMatch) {
          type  = 'cover';
          title = coverMatch[2].trim() || (lines[1] || '');
          body  = lines.slice(1).join('\n');
        } else if (ctaMatch) {
          type  = 'cta';
          title = '';
          body  = ctaMatch[2].trim() || lines.slice(1).join('\n');
        } else if (bodyMatch) {
          type  = 'content';
          title = bodyMatch[2].trim() || (lines[1] || '');
          body  = lines.slice(1).join('\n');
        } else {
          // Auto: primeiro = capa, último = cta (se 3+), resto = conteúdo
          var isFirst = (i === 0);
          var isLast  = (i === total - 1);
          type  = isFirst ? 'cover' : (isLast && total >= 3 ? 'cta' : 'content');
          title = lines[0];
          body  = lines.slice(1).join('\n') || lines[0];
        }

        slides.push({ id: Date.now().toString() + i, type: type, title: title, body: body });
      }

      return slides;
    }

    function parseAndLoad() {
      var rawText = document.getElementById('raw-text').value.trim();
      if (!rawText) {
        showStatus('Cole um roteiro antes de interpretar.', 'error');
        return;
      }
      var parsed = parseRawText(rawText);
      if (parsed.length === 0) {
        showStatus('Não foi possível detectar slides no texto.', 'error');
        return;
      }
      manualSlides = parsed;
      renderManualSlides();
      document.getElementById('raw-text').value = '';
      showStatus(parsed.length + ' slides interpretados!', 'success');
    }

    // --- Manual Handling ---
    function addManualSlide(type) {
      manualSlides.push({ id: Date.now().toString(), type, title: '', body: '' });
      renderManualSlides();
      
      // Auto-scroll
      const list = document.getElementById('manual-slides-list');
      setTimeout(() => list.scrollTop = list.scrollHeight, 50);
    }

    function removeManualSlide(id) {
      manualSlides = manualSlides.filter(s => s.id !== id);
      renderManualSlides();
    }

    function updateManualSlide(id, field, value) {
      const slide = manualSlides.find(s => s.id === id);
      if (slide) slide[field] = value;
      checkCanGenerate();
    }

    function renderManualSlides() {
      const list = document.getElementById('manual-slides-list');
      
      if (manualSlides.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-dim); font-size: 11px;">Nenhum slide adicionado.</div>';
        checkCanGenerate();
        return;
      }

      list.innerHTML = manualSlides.map((slide, i) => `
        <div class="manual-slide">
          <div class="manual-slide-header">
            <span class="manual-slide-type">Slide ${i + 1} (${slide.type})</span>
            <button class="manual-delete" onclick="removeManualSlide('${slide.id}')">✕</button>
          </div>
          ${slide.type === 'cover' ? 
            `<input type="text" class="manual-input" placeholder="Título da Capa" value="${slide.title}" onkeyup="updateManualSlide('${slide.id}', 'title', this.value)">` : ''
          }
          <textarea class="manual-input" placeholder="${slide.type === 'cta' ? 'Texto da CTA' : 'Conteúdo do slide'}" onkeyup="updateManualSlide('${slide.id}', 'body', this.value)">${slide.body}</textarea>
        </div>
      `).join('');
      checkCanGenerate();
    }


    // --- API & Queue ---
    async function fetchQueue() {
      const url = document.getElementById('api-url').value.trim().replace(/\/$/, '');
      if (!url) return;
      localStorage.setItem('aria_api_url', url);
      
      try {
        const res = await fetch(`${url}/api/uma/queue`);
        const data = await res.json();
        queueItems = data.items || [];
        renderQueue();
      } catch (e) {
        showStatus('Erro ao conectar na API', 'error');
        document.getElementById('queue-list').innerHTML = `
          <div style="text-align:center; padding: 20px; color: #ff8080; font-size: 11px;">
            Erro na conexão com<br>${url}<br><br>
            <button class="btn-icon" onclick="fetchQueue()">TENTAR NOVAMENTE</button>
          </div>
        `;
      }
    }

    function renderQueue() {
      const list = document.getElementById('queue-list');
      if (queueItems.length === 0) {
        list.innerHTML = `
          <div style="text-align:center; padding: 20px; color: var(--text-dim); font-size: 11px;">
            Sem carrosséis na fila.
            <br>Gere um via web e clique para buscar:
            <br><br>
            <button class="btn-icon" onclick="fetchQueue()">RECARREGAR FILA</button>
          </div>
        `;
        return;
      }

      list.innerHTML = queueItems.map(item => `
        <div class="queue-item ${selectedItemId === item.id ? 'selected' : ''}" onclick="selectItem('${item.id}')">
          <div class="item-title">${item.carousel.title}</div>
          <div class="item-meta">${item.carousel.slides.length} slides • ${item.id.split('-').pop()}</div>
        </div>
      `).join('');
      checkCanGenerate();
    }

    function selectItem(id) {
      selectedItemId = id;
      renderQueue();
    }

    // --- File Handling ---
    function handleFiles(files) {
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
          uploadedImages.push(e.target.result);
          renderPreviews();
        };
        reader.readAsArrayBuffer(file);
      });
    }

    function renderPreviews() {
      const grid = document.getElementById('preview-grid');
      grid.innerHTML = uploadedImages.map((buf, i) => {
        const blob = new Blob([buf], { type: 'image/png' });
        const url = URL.createObjectURL(blob);
        return `<div class="preview-thumb" onclick="removeImage(${i})"><img src="${url}"></div>`;
      }).join('');
      checkCanGenerate();
    }
    
    function removeImage(index) {
      uploadedImages.splice(index, 1);
      renderPreviews();
    }

    // --- Actions ---
    function checkCanGenerate() {
      const btn = document.getElementById('btn-generate');
      if (currentMode === 'api') {
        btn.disabled = !selectedItemId;
      } else {
        btn.disabled = manualSlides.length === 0;
      }
    }

    function startGeneration() {
      let carouselPayload = null;
      let qId = null;

      if (currentMode === 'api') {
        const item = queueItems.find(i => i.id === selectedItemId);
        if (!item) return;
        carouselPayload = item.carousel;
        qId = selectedItemId;
      } else {
        // Build mock carousel from manual slides
        carouselPayload = {
          title: manualSlides[0]?.title || 'Manual Carousel',
          slides: manualSlides.map((s, idx) => ({
            position: idx + 1,
            type: s.type,
            title: s.title,
            body: s.body
          }))
        };
        qId = 'manual';
      }

      showStatus('Gerando slides...', 'info');
      
      const imagesPayload = uploadedImages.map(buf => new Uint8Array(buf));

      parent.postMessage({
        pluginMessage: {
          type: 'generate',
          carousel: carouselPayload,
          images: imagesPayload,
          _queueId: qId
        }
      }, '*');
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.className = `status-msg ${type}`;
      el.innerText = msg;
    }

    // Listen to messages from code.js
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'done') {
        showStatus(`${msg.count} slides gerados!`, 'success');
        if (currentMode === 'api') {
          queueItems = queueItems.filter(i => i.id !== msg._queueId);
          selectedItemId = null;
          renderQueue();
        }
      }
      if (msg.type === 'error') showStatus(msg.message, 'error');
      if (msg.type === 'progress') showStatus(msg.message, 'info');
    };

    // Load URL on init
    const defaultUrl = 'http://localhost:3001';
    document.getElementById('api-url').value = defaultUrl;
    fetchQueue();
    renderManualSlides();
  </script>
</body>
</html>
