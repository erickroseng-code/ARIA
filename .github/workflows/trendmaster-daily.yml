name: TIE Daily Agent

on:
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: trendmaster
        run: |
          pip install apify-client sqlmodel anthropic openai python-dotenv pytrends beautifulsoup4 lxml httpx

      - name: Run TrendMaster Agent
        working-directory: trendmaster
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RENDER_WEBHOOK_URL: ${{ secrets.ARIA_API_URL }}/api/trendmaster/webhook
        run: |
          cd src && python main.py
