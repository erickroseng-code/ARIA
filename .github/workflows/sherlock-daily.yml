name: Sherlock Daily Agent

on:
  schedule:
    - cron: '0 10 * * *' # 10:00 UTC = 07:00 BRT
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: sherlock
        run: |
          pip install apify-client sqlmodel anthropic openai python-dotenv pytrends beautifulsoup4 lxml httpx playwright playwright-stealth
          playwright install chromium --with-deps

      - name: Run Sherlock Agent
        working-directory: sherlock
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RENDER_WEBHOOK_URL: ${{ secrets.ARIA_API_URL }}/api/sherlock/webhook
        run: |
          cd src && python main.py
