name: AIDA
full_name: "Attention → Interest → Desire → Action"
source: "Scientific Advertising (Claude Hopkins) / Adweek Copywriting Handbook"
best_for:
  - Lançamentos e ofertas
  - Persona que ainda não tem a dor ativa (problema latente)
  - Transformações aspiracionais

structure:
  attention:
    label: "GANCHO — Atenção (0-3s)"
    instruction: "Para o scroll com 1 frase. Pode ser: stat chocante, afirmação controversa, pergunta impossível de ignorar, ou elemento visual/sonoro inesperado."
    duration: "0-3s"
  interest:
    label: "INTERESSE — Contexto (3-15s)"
    instruction: "Construa o contexto que torna a promessa crível. Use dados, história pessoal, ou mecanismo revelador. Mantenha o espectador em 'quero saber mais'."
    duration: "3-15s"
  desire:
    label: "DESEJO — A Transformação (15-40s)"
    instruction: "Mostre a versão transformada: antes vs. depois. Seja específico com resultados. Use prova social, caso de estudo real, ou demonstração. O espectador deve se ver no resultado."
    duration: "15-40s"
  action:
    label: "AÇÃO — CTA (Final)"
    instruction: "1 passo apenas. Reduza a fricção máxima. Crie urgência real ou especifique exatamente o que acontece depois do clique."

few_shot_example: |
  🎣 ATENÇÃO: "Em 47 dias eu passei de 0 para R$28.000 vendendo pelo Instagram sem fazer stories todos os dias, sem aparecer todo dia e sem gastar um centavo em anúncio."
  
  🔍 INTERESSE: "Mas não foi milagre. Foi uma descoberta que fiz lendo um livro de 1923 chamado 'Scientific Advertising' — onde um publicitário americano já havia mapeado exatamente como o cérebro humano decide comprar. O problema é que quase ninguém aplicou isso ao Instagram."
  
  💎 DESEJO: "Quando eu apliquei o framework que identifiquei nesse livro, meu feed parou de ser um portfólio bonito e virou uma máquina de criar contexto de compra. Meus clientes relatam a mesma coisa: 50 a 200% de aumento nas vendas sem postar mais — só postando diferente."
  
  📣 AÇÃO: "Salva esse vídeo. Na sequência vou mostrar o framework completo com os 3 tipos de post que você precisa ter no seu feed essa semana."
