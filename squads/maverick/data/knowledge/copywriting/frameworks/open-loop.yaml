name: OPEN_LOOP
full_name: "Open Loop → Revelation → Payoff"
source: "Hit Makers (Thompson) / Breakthrough Advertising (Schwartz) / Cashvertising"
best_for:
  - Máximo engajamento e retenção no vídeo
  - Tópicos educativos com revelação surpreendente
  - Quando o conteúdo tem um twist ou insight contraintuitivo

structure:
  open_loop:
    label: "LOOP ABERTO — A Promessa (0-5s)"
    instruction: |
      Abra um loop que o cérebro é INCAPAZ de ignorar. Técnicas:
      - Pergunta sem resposta imediata: "A razão pela qual você não vende não é o que você pensa..."
      - Decisão suspensa: "Eu quase fechei minha empresa por causa de um erro simples..."
      - Número específico sem contexto: "487. Esse número mudou tudo pra mim."
      REGRA CRÍTICA: Nunca entregue a resposta no gancho.
    duration: "0-5s"
  tension:
    label: "TENSÃO — Construção do Contexto (5-30s)"
    instruction: "Alimente o loop com contexto que aumenta a curiosidade sem resolver. Adicione camadas: quem você era, o que estava em jogo, o que você tentou antes. Crie tensão narrativa."
    duration: "5-30s"
  revelation:
    label: "REVELAÇÃO — O Payoff (30-50s)"
    instruction: "Entregue a revelação de forma impactante. Ela precisa ser contraintuitiva OU validar uma suspeita que o espectador já tinha mas nunca ouviu ninguém confirmar. Conecte ao problema do espectador imediatamente."
    duration: "30-50s"
  cta:
    label: "CTA — Próximo Loop (Final)"
    instruction: "Abra um novo loop menor no CTA para garantir o follow ou a ação. 'E amanhã eu vou mostrar a segunda parte — o que fazer depois disso.'"

few_shot_example: |
  🎣 LOOP ABERTO: "Tem uma coisa que os maiores criadores de conteúdo do Brasil fazem nos primeiros 3 segundos de cada vídeo que 99% das pessoas nunca percebe... e que explica por que eles dominam o algoritmo."
  
  ⏳ TENSÃO: "Durante 8 meses eu estudei obsessivamente os 50 maiores perfis do Brasil no meu nicho. Assisti mais de 400 horas de conteúdo. Fiz planilhas. Mapeei padrões. E quando encontrei o padrão comum... fiquei com raiva. Porque é simples. É quase óbvio. E ninguém fala sobre isso porque todo mundo assume que os outros também fazem."
  
  💡 REVELAÇÃO: "Todos eles — sem exceção — abrem o vídeo com uma frase incompleta. Uma frase que o seu cérebro é fisicamente incapaz de ignorar porque cria o que neurocientistas chamam de 'tensão de conclusão' — seu cérebro não consegue parar de pensar até receber a informação que falta. É a mesma razão que te faz chegar no fim de uma série de Netflix às 3 da manhã dizendo 'só mais um episódio'. Eles estão usando isso nos primeiros 3 segundos de cada vídeo."
  
  📣 CTA: "Eu mapeei os 7 tipos de abertura de loop que eles usam. Salva esse vídeo — amanhã eu mostro todos os 7 com exemplos reais."
