name: maverick
version: 1.0.0
description: "Squad Maverick - Especialista em criação de conteúdo baseada em conhecimento e análise de perfil."
owner: "@erick"
icon: "🦅"
type: "content-creation"

# Configuração de Governança
governance:
  architecture: "task-first"
  validation_level: "strict"
  delivery_mode: "asynchronous" # Para que o usuário baixe depois

# Agentes Especialistas
agents:
  - id: "maverick-scout"
    role: "Analista de Redes Sociais"
    description: "Navega em perfis sociais e extrai bio, posts e tom de voz."
    file: "./agents/maverick-scout.yaml"

  - id: "maverick-scholar"
    role: "Gestor de Conhecimento"
    description: "Gerencia RAG de livros, vídeos e transcrições."
    file: "./agents/maverick-scholar.yaml"

  - id: "maverick-strategist"
    role: "Estrategista de Conteúdo"
    description: "Realiza o diagnóstico comparativo e gera sugestões de tópicos."
    file: "./agents/maverick-strategist.yaml"

  - id: "maverick-copywriter"
    role: "Roteirista Criativo"
    description: "Cria roteiros baseados em modelos e conhecimento do Scholar."
    file: "./agents/maverick-copywriter.yaml"

  - id: "maverick-designer"
    role: "Automação de Design"
    description: "Gera artes no Figma/Canva com base em referências visuais."
    file: "./agents/maverick-designer.yaml"

# Fluxos de Trabalho (Workflow Architecture)
workflows:
  - id: "maverick-content-loop"
    name: "Fluxo Completo de Criação"
    description: "Do diagnóstico à entrega visual."
    file: "./workflows/content-loop.yaml"

# Armazenamento de Dados & Referências
data:
  knowledge_base: "./data/knowledge/"
  profile_snapshots: "./data/snapshots/"
  design_references: "./data/references/"
  deliverables: "./data/deliverables/"

# Metadados de Orquestração
meta:
  framework_version: "AIOS 2.1"
  status: "active"
