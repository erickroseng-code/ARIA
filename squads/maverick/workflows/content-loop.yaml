id: "maverick-content-loop"
name: "Maverick Content Loop"
description: "Fluxo completo de inteligência de conteúdo: Do diagnóstico do perfil à criação de roteiros aprovados."
trigger: "manual" # Iniciado pelo usuário com um @username

steps:
  # ---------------------------------------------------------
  # FASE 1: Inteligência & Diagnóstico (Scout + Scholar)
  # ---------------------------------------------------------
  - id: "step-1-scout-analysis"
    agent: "maverick-scout"
    task: "analyze-profile-structure"
    input: 
      username: "{{trigger.username}}"
    description: "Navegação inicial: Bio, Destaques e Promessa Visual."

  - id: "step-2-scout-deep-dive"
    agent: "maverick-scout"
    task: "semantic-post-analysis"
    input:
      username: "{{trigger.username}}"
    description: "Leitura semântica dos últimos 9-12 posts."
    dependency: "step-1-scout-analysis"

  # ---------------------------------------------------------
  # FASE 2: Estratégia (Strategist)
  # ---------------------------------------------------------
  - id: "step-3-gap-identification"
    agent: "maverick-strategist"
    task: "cross-reference-profile-knowledge"
    input:
      profile_data: "{{step-1.output}} + {{step-2.output}}"
    description: "Cruza a realidade do perfil com a base de conhecimento do Scholar."

  - id: "step-4-plan-generation"
    agent: "maverick-strategist"
    task: "compile-strategic-markdown"
    input:
      gap_analysis: "{{step-3.output}}"
    description: "Gera o documento Markdown 'Plano de Ação Maverick'."

  # ---------------------------------------------------------
  # FASE 3: Governança (Humano)
  # ---------------------------------------------------------
  - id: "step-5-approval-gate"
    agent: "maverick-copywriter"
    task: "human-approval-gate"
    input:
      strategic_plan: "{{step-4.output}}"
    description: "Pausa o fluxo e aguarda aprovação humana do plano."
    type: "human-interaction"

  # ---------------------------------------------------------
  # FASE 4: Execução Criativa (Copywriter + Designer)
  # *Só executa se step-5 for 'approved'*
  # ---------------------------------------------------------
  - id: "step-6-script-writing"
    agent: "maverick-copywriter"
    task: "write-creative-script"
    input:
      approved_plan: "{{step-4.output}}"
    description: "Escreve os roteiros finais definidos no plano."
    condition: "{{step-5.approved}} == true"

  - id: "step-7-visual-design"
    agent: "maverick-designer"
    task: "generate-visual-design"
    input:
      scripts: "{{step-6.output}}"
    description: "Gera as artes/carrosséis para os roteiros criados."
    condition: "{{step-5.approved}} == true"

output:
  final_deliverable: 
    - "{{step-4.output}}" # O Plano Estratégico (Markdown/PDF)
    - "{{step-6.output}}" # Os Roteiros (Texto)
    - "{{step-7.output}}" # As Artes (Links/Arquivos)
